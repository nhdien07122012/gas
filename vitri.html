<body>
  <div class="container">
    <h1>📍 Quản lý vị trí điểm gas</h1>
    
    <div class="search-group">
      <input id="search" placeholder="Tìm kiếm tên điểm, địa chỉ hoặc ghi chú...">
    </div>
    
    <div class="table-container">
      <table id="vitri-table">
        <thead>
          <tr>
            <th>Tên điểm</th>
            <th>Địa chỉ</th>
            <th>Tọa độ GPS</th>
            <th>Mở bản đồ</th>
          </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>
    </div>
    
    <div id="empty-state">
      <h3>📭 Chưa có vị trí nào được lưu</h3>
      <p>Hãy sử dụng chức năng lưu vị trí GPS trên trang chính để bắt đầu.</p>
      <p style="font-size: 0.9rem; margin-top: 10px;">
        <em>Lưu ý: Chỉ những điểm gas có tọa độ GPS mới hiển thị ở đây.</em>
      </p>
    </div>
  </div>

  <a href="index.html" class="back-button" title="Quay về trang chính" aria-label="Quay về trang chính">
    ←
  </a>

<script>
// URL của Google Apps Script (giữ nguyên)
const scriptURL = 'https://script.google.com/macros/s/AKfycbyRnnoEd2BnD7u1pXHER17Cv95BN9Z77yUeO6oR7CFRtbUqd-SiVJqBv5ENYyARwX77fw/exec';
let allData = [];
let vitriData = [];
let currentFilteredData = [];

// Hàm ép kiểu an toàn để trích xuất GPS
function extractGPS(note) {
  // Ép mọi giá trị về chuỗi
  const noteStr = note == null ? '' : String(note);
  if (!noteStr.trim()) return null;
  
  const match = noteStr.match(/\[GPS:\s*([\d.]+),\s*([\d.]+)\]/);
  if (match) {
    const lat = parseFloat(match[1]);
    const lng = parseFloat(match[2]);
    if (!isNaN(lat) && !isNaN(lng)) {
      return { 
        lat: lat.toFixed(6), 
        lng: lng.toFixed(6),
        rawLat: lat,
        rawLng: lng
      };
    }
  }
  return null;
}

// Hàm escape HTML an toàn (xử lý mọi kiểu dữ liệu)
function escapeHtml(text) {
  if (text == null) return '';
  const str = String(text);
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Hiển thị danh sách vị trí
function displayVitri(data) {
  const tbody = document.getElementById('table-body');
  const emptyState = document.getElementById('empty-state');
  
  if (!data || data.length === 0) {
    tbody.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  
  tbody.innerHTML = '';
  let count = 0;
  
  data.forEach(row => {
    const gps = extractGPS(row.ghi_chu);
    if (!gps) return;
    
    count++;
    const tr = document.createElement('tr');
    tr.className = 'fade-in';
    
    // Đảm bảo mọi giá trị được xử lý an toàn
    const tenDiem = escapeHtml(row.ten_diem) || 'Chưa có tên';
    const diaChi = escapeHtml(row.dia_chi) || 'Chưa có địa chỉ';
    
    tr.innerHTML = `
       <td><div style="font-weight: 600; color: var(--text-primary);">${tenDiem}</div></td>
       <td><div style="color: var(--text-secondary); font-size: 0.9rem;">${diaChi}</div></td>
       <td>
         <div class="badge" data-coords="${gps.lat}, ${gps.lng}" title="Nhấn để sao chép tọa độ">
           ${gps.lat}, ${gps.lng}
         </div>
       </td>
       <td>
         <a class="map-link" href="https://maps.google.com/?q=${gps.rawLat},${gps.rawLng}" target="_blank" title="Mở Google Maps">
           🗺️ <span style="font-size: 0.85rem;">Maps</span>
         </a>
       </td>
    `;
    
    tbody.appendChild(tr);
  });
  
  if (count === 0) {
    emptyState.style.display = 'block';
    emptyState.innerHTML = `
      <h3>📭 Không tìm thấy vị trí</h3>
      <p>Không có điểm gas nào có tọa độ GPS trong dữ liệu hiện tại.</p>
      <p style="font-size: 0.9rem; margin-top: 10px;">
        <em>Lưu ý: Chỉ những điểm gas có tọa độ GPS mới hiển thị ở đây.</em>
      </p>
    `;
  } else {
    emptyState.style.display = 'none';
  }
  
  updateResultCount(count);
}

function updateResultCount(count) {
  const header = document.querySelector('h1');
  if (header) {
    const currentText = header.textContent.replace(/\(\d+\)$/, '').trim();
    header.textContent = count > 0 ? `${currentText} (${count})` : currentText;
  }
}

function filterVitri() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  if (!query) {
    currentFilteredData = vitriData;
    displayVitri(vitriData);
    return;
  }
  
  const filtered = vitriData.filter(row => {
    const searchableText = `
      ${row.ten_diem || ''}
      ${row.dia_chi || ''}
      ${row.ghi_chu || ''}
    `.toLowerCase();
    return searchableText.includes(query);
  });
  
  currentFilteredData = filtered;
  displayVitri(filtered);
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      showToast(`✅ Đã sao chép: ${text}`);
    } else {
      const textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.style.position = 'fixed';
      textArea.style.opacity = '0';
      document.body.appendChild(textArea);
      textArea.select();
      const success = document.execCommand('copy');
      document.body.removeChild(textArea);
      if (success) {
        showToast(`✅ Đã sao chép: ${text}`);
      } else {
        showToast('❌ Không thể sao chép vào clipboard', 'error');
      }
    }
  } catch (err) {
    console.error('Lỗi sao chép:', err);
    showToast('❌ Lỗi khi sao chép', 'error');
  }
}

function showToast(message, type = 'success') {
  let toast = document.getElementById('toast-notification');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast-notification';
    toast.style.cssText = `
      position: fixed;
      top: 20px;
      right: 20px;
      background: ${type === 'success' ? 'var(--secondary)' : 'var(--danger)'};
      color: var(--text-inverse);
      padding: 12px 20px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 0.3s, transform 0.3s;
      font-weight: 500;
      border: 1px solid ${type === 'success' ? 'var(--secondary-dark)' : 'var(--danger-dark)'};
    `;
    document.body.appendChild(toast);
  }
  
  toast.textContent = message;
  toast.style.opacity = '1';
  toast.style.transform = 'translateY(0)';
  
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateY(-20px)';
    setTimeout(() => {
      if (toast.parentNode) document.body.removeChild(toast);
    }, 300);
  }, 3000);
}

async function taiDuLieu() {
  try {
    console.log('Đang tải dữ liệu...');
    const url = scriptURL + '?t=' + Date.now();
    const response = await fetch(url);
    
    if (!response.ok) throw new Error(`Lỗi HTTP ${response.status}`);
    
    const text = await response.text();
    let data;
    
    try {
      data = JSON.parse(text);
    } catch (parseError) {
      // Thử sửa lỗi JSON (ví dụ thiếu dấu ngoặc)
      const fixedText = text.trim();
      if (fixedText.startsWith('[') && fixedText.endsWith(']')) {
        data = JSON.parse(fixedText);
      } else {
        throw new Error('Dữ liệu không phải JSON hợp lệ');
      }
    }
    
    // Nếu dữ liệu là object có thuộc tính data (một số cấu hình Google Apps Script)
    if (data && typeof data === 'object' && !Array.isArray(data) && data.data && Array.isArray(data.data)) {
      data = data.data;
    }
    
    if (!Array.isArray(data)) throw new Error('Dữ liệu không phải mảng');
    
    allData = data;
    console.log(`Đã tải ${allData.length} bản ghi`);
    
    // Lọc các điểm có GPS
    vitriData = allData.filter(row => extractGPS(row.ghi_chu) !== null);
    
    // Loại bỏ trùng lặp (theo tên điểm và tọa độ)
    const uniqueMap = new Map();
    vitriData.forEach(row => {
      const gps = extractGPS(row.ghi_chu);
      if (gps) {
        const key = `${row.ten_diem || ''}_${gps.lat}_${gps.lng}`;
        if (!uniqueMap.has(key)) uniqueMap.set(key, row);
      }
    });
    vitriData = Array.from(uniqueMap.values());
    
    currentFilteredData = vitriData;
    displayVitri(vitriData);
    
    if (vitriData.length === 0) {
      showToast('⚠️ Không có điểm gas nào có tọa độ GPS', 'warning');
    } else {
      showToast(`✅ Đã tải ${vitriData.length} vị trí có GPS`);
    }
    
  } catch (error) {
    console.error('Lỗi tải dữ liệu:', error);
    const emptyState = document.getElementById('empty-state');
    emptyState.style.display = 'block';
    emptyState.innerHTML = `
      <h3>❌ Lỗi khi tải dữ liệu</h3>
      <p>Không thể kết nối đến nguồn dữ liệu. Vui lòng thử lại sau.</p>
      <p style="font-size: 0.9rem; margin-top: 10px;">
        <em>Chi tiết lỗi: ${escapeHtml(error.message)}</em>
      </p>
      <button onclick="taiDuLieu()" style="
        margin-top: 15px;
        padding: 8px 16px;
        background: var(--primary);
        color: var(--text-inverse);
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-weight: 500;
      ">
        🔄 Thử lại
      </button>
    `;
    showToast('❌ Không thể tải dữ liệu từ Google Sheets!', 'error');
  }
}

// Sự kiện tìm kiếm
document.getElementById('search').addEventListener('input', filterVitri);
document.getElementById('search').addEventListener('keypress', e => { if (e.key === 'Enter') filterVitri(); });

// Xử lý click sao chép tọa độ (delegation)
document.addEventListener('click', e => {
  const badge = e.target.closest('.badge');
  if (badge) {
    const coords = badge.getAttribute('data-coords') || badge.textContent.trim();
    if (coords) copyToClipboard(coords);
  }
});

// Khởi động
document.addEventListener('DOMContentLoaded', () => {
  console.log('=== TRANG QUẢN LÝ VỊ TRÍ KHỞI ĐỘNG ===');
  taiDuLieu();
  setTimeout(() => document.getElementById('search')?.focus(), 500);
});

// Tải lại khi online
window.addEventListener('online', () => {
  console.log('Kết nối mạng được khôi phục, tải lại dữ liệu...');
  taiDuLieu();
});
</script>
